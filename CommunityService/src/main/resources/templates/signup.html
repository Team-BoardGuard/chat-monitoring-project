<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="signup-container">
        <h2>회원가입 📝</h2>
        
        <form id="signupForm" th:action="@{/user/signup}" th:object="${signupRequestDto}" method="post">
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" th:field="*{name}" required>
            </div>
            
            <div class="form-group">
                <label for="nickname">닉네임</label>
                <input type="text" id="nickname" th:field="*{nickname}" required>
                <span id="nickname-check-msg"></span>
            </div>
            
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" th:field="*{password}" required>
            </div>
            
            <div th:if="${#fields.hasGlobalErrors()}">
                <p class="error-message" th:each="err : ${#fields.globalErrors()}" th:text="${err}">전체 에러 메시지</p>
            </div>

            <button type="submit" class="btn">가입하기</button>
        </form>

        <div id="result-message" style="margin-top: 15px; text-align: center;"></div>
    </div>

    <script src="/js/signup.js"></script>
</body>
</html>
